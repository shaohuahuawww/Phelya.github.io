<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第二章 实验报告 | Phelya博客</title>
    <meta
      name="description"
      content="微加工工艺实验报告第二章，PDF 在线预览页面。"
    />
    <style>
      :root {
        --bg: #070a14;
        --surface: rgba(16, 15, 26, 0.8);
        --line: rgba(255, 169, 199, 0.3);
        --text: #fff0f6;
        --muted: rgba(255, 233, 242, 0.76);
        --accent: #ff94b7;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 148, 183, 0.1), transparent 18%),
          radial-gradient(circle at top right, rgba(125, 211, 252, 0.08), transparent 22%),
          linear-gradient(180deg, #060913 0%, #0a0f1a 100%);
        font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      h1, p { margin: 0; }
      .shell {
        width: min(1240px, calc(100% - 28px));
        margin: 24px auto 42px;
      }
      .topbar, .hero, .viewer-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 14px 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--accent);
        font-weight: 800;
      }
      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center 22%;
      }
      .back-link,
      .download-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
      }
      .download-link {
        color: var(--accent);
      }
      .hero {
        margin-top: 18px;
        padding: 30px;
      }
      .eyebrow {
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.82rem;
        font-weight: 800;
      }
      h1 {
        margin-top: 12px;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        line-height: 1.08;
      }
      .viewer-card {
        margin-top: 18px;
        padding: 20px;
      }
      .viewer {
        width: 100%;
        min-height: 1100px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: #ffffff;
      }
      @media (max-width: 720px) {
        .shell { width: min(100% - 18px, 1240px); }
        .topbar { flex-direction: column; align-items: stretch; }
        .hero, .viewer-card { padding: 18px; }
        .viewer { min-height: 760px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="./microfab.html">
          <img src="../assets/anime/nav-avatar.jpg" alt="头像" />
          <span>Phelya · 微加工工艺实验报告</span>
        </a>
        <div>
          <a class="back-link" href="./microfab.html">返回目录</a>
          <a class="download-link" href="../content/microfab-report-2.pdf" download>下载 PDF</a>
        </div>
      </header>

      <section class="hero">
        <p class="eyebrow">Experiment Report 02</p>
        <h1>第二章 实验报告</h1>
      </section>

      <section class="viewer-card">
        <iframe
          class="viewer"
          src="../content/microfab-report-2.pdf#toolbar=1&navpanes=0"
          title="第二章 实验报告"
        ></iframe>
      </section>
    </div>
  </body>
</html>
