<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微加工工艺实验报告 | Phelya博客</title>
    <meta
      name="description"
      content="微加工工艺实验报告目录，收录实验一与实验二 PDF 预览与下载入口。"
    />
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --line: #d7deea;
        --text: #1f2a37;
        --muted: #5f6f85;
        --accent: #315dff;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(180deg, #edf2f9 0%, #f7f9fc 100%);
        font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      h1, h2, h3, p { margin: 0; }
      .shell {
        width: min(1240px, calc(100% - 28px));
        margin: 24px auto 42px;
      }
      .topbar,
      .hero,
      .report-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: var(--shadow);
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 14px 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--accent);
        font-weight: 800;
      }
      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center 22%;
      }
      .back-link,
      .download-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: #fff;
      }
      .download-link {
        color: var(--accent);
        font-weight: 700;
      }
      .hero {
        margin-top: 18px;
        padding: 30px;
      }
      .eyebrow {
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.82rem;
        font-weight: 800;
      }
      h1 {
        margin-top: 12px;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        line-height: 1.08;
      }
      .hero-desc {
        margin-top: 14px;
        max-width: 780px;
        color: var(--muted);
        line-height: 1.9;
      }
      .report-list {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }
      .report-card {
        padding: 20px;
      }
      .report-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
      }
      .report-subtitle {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.8;
      }
      .viewer {
        width: 100%;
        min-height: 1100px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #ffffff;
      }
      @media (max-width: 720px) {
        .shell { width: min(100% - 18px, 1240px); }
        .topbar,
        .report-head {
          flex-direction: column;
          align-items: stretch;
        }
        .hero,
        .report-card {
          padding: 18px;
        }
        .viewer {
          min-height: 760px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="../index.html#math-sections">
          <img src="../assets/anime/nav-avatar.jpg" alt="头像" />
          <span>Phelya · 微加工工艺实验报告</span>
        </a>
        <a class="back-link" href="../index.html#math-sections">返回首页</a>
      </header>

      <section class="hero">
        <p class="eyebrow">Experiment Reports</p>
        <h1>微加工工艺实验报告</h1>
        <p class="hero-desc">
          这里收录实验一和实验二两份 PDF。页面直接提供在线预览，同时保留下载入口，方便你后面继续补新的实验报告。
        </p>
      </section>

      <section class="report-list">
        <article class="report-card" id="report-1">
          <div class="report-head">
            <div>
              <h2>第一节实验报告</h2>
              <p class="report-subtitle">PDF 在线预览</p>
            </div>
            <a class="download-link" href="../content/microfab-report-1.pdf" download>下载 PDF</a>
          </div>
          <iframe
            class="viewer"
            src="../content/microfab-report-1.pdf#toolbar=1&navpanes=0"
            title="第一节实验报告"
          ></iframe>
        </article>

        <article class="report-card" id="report-2">
          <div class="report-head">
            <div>
              <h2>第二节实验报告</h2>
              <p class="report-subtitle">PDF 在线预览</p>
            </div>
            <a class="download-link" href="../content/microfab-report-2.pdf" download>下载 PDF</a>
          </div>
          <iframe
            class="viewer"
            src="../content/microfab-report-2.pdf#toolbar=1&navpanes=0"
            title="第二节实验报告"
          ></iframe>
        </article>
      </section>
    </div>
  </body>
</html>
