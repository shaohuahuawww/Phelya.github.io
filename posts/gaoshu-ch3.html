      }

      .topbar,

        border-radius: 24px;
        background: var(--surface);

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 14px 18px;

        padding: 34px 30px;
        display: grid;
        align-items: end;
        background:

        color: var(--accent);

        max-width: 760px;
        color: var(--muted);
        line-height: 1.9;
      }

      .hero-meta {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 148, 183, 0.12);
        color: var(--accent);
        font-weight: 800;

        font-size: 1.28rem;

        margin-top: 8px;
        color: var(--muted);
        line-height: 1.8;
      }

      .pages {
        display: grid;
        gap: 20px;

      .page-card {
        margin: 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
      }

        width: 100%;
        border-radius: 16px;

      }

        .shell {
          width: min(100% - 16px, 1160px);
        }

          flex-direction: column;
          align-items: stretch;
